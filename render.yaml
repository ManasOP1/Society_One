# Render Blueprint — SocietyOne API (NestJS)
# Repo: https://github.com/ManasOP1/Society_One
# Dashboard: set Root Directory to "api" if not using this blueprint.
#
# CRITICAL: Free plan sleeps after ~15 min idle → 30–50s cold starts on login.
# Use starter (or higher) for production so admin + mobile stay responsive.
# Optional free-tier workaround: ping GET /api/v1/health every 10–14 min (UptimeRobot).

services:
  - type: web
    name: societyone-api
    runtime: node
    rootDir: api
    plan: starter
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: API_PREFIX
        value: api/v1
      - key: RAZORPAY_ENABLED
        value: "false"
      # Set the rest in Render Dashboard → Environment (secrets):
      # DATABASE_URL, JWT_ACCESS_SECRET, JWT_REFRESH_SECRET,
      # SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, CORS_ORIGINS,
      # APP_PUBLIC_URL, REDIS_URL (or REDIS_HOST/PORT/PASSWORD/TLS)
